[module/vpn]
type = custom/script
interval = 2
exec = $HOME/.config/bin/vpn-stat.sh
offset-x = 80%

[module/eth]
type = custom/script
interval = 2
exec = $HOME/.config/bin/eth-stat-ip.sh
offset-x = 80%

[module/target]
type = custom/script
interval = 2
exec = $HOME/.config/bin/target.sh


[module/clickabledate]
