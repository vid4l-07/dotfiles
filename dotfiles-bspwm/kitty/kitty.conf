enable_audio_bell no

include color.ini

font_family      CaskaydiaCove NF
font_size 13

disable_ligatures never

url_color #61afef

url_style curly

map ctrl+left neighboring_window left
map ctrl+right neighboring_window right
map ctrl+up neighboring_window up
map ctrl+down neighboring_window down
map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+z kitten zoom_toggle.py

map ctrl+f1 copy_to_buffer a
map f1 paste_from_buffer a
map ctrl+f2 copy_to_buffer b
map f2 paste_from_buffer b

mouse_hide_wait 2.0
detect_urls yes

repaint_delay 10
input_delay 3
sync_to_monitor yes

tab_bar_style powerline
inactive_tab_background #8B8B8B
active_tab_background #61D6DF
inactive_tab_foreground #000

background_opacity 0.97

window_padding_width 0

shell zsh
